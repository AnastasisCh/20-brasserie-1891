<section class="hours" id="hours">
  <div class="container">
    <div class="hours-grid" appReveal>

      <div class="hours-schedule">
        <p class="section-label">{{ lang.t().hours.label }}</p>
        <h2 class="section-title">{{ lang.t().hours.titlePre }} <em>{{ lang.t().hours.titleEm }}</em></h2>

        <p class="hours-intro">{{ lang.t().hours.intro }}</p>

        <ul class="hours-list" aria-label="Opening hours">
          <li class="hours-row" *ngFor="let entry of lang.t().hours.entries">
            <span class="hours-day">{{ entry.day }}</span>
            <span class="hours-time">{{ entry.time }}</span>
          </li>
        </ul>

        <p class="kitchen-note" role="note">
          <span aria-hidden="true">🌊</span>
          {{ lang.t().hours.kitchenNote }}
        </p>
      </div>

      <div class="hours-moods">
        <div
          *ngFor="let card of lang.t().hours.moods"
          class="mood-card"
          [class.mood-card--accent]="card.accent">
          <p class="mood-time">{{ card.time }}</p>
          <h4>{{ card.title }}</h4>
          <p>{{ card.description }}</p>
        </div>
      </div>

    </div>
  </div>
</section>
