<section class="about" id="about">
  <div class="container">
    <div class="about-grid" appReveal>

      <!-- Images -->
      <div class="about-visual">
        <div class="about-img about-img-main">
          <img
            src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=700&q=80"
            alt="Brasserie 1891 elegant dining room with warm brass fixtures and classic decor"
            loading="lazy" />
        </div>
        <div class="about-img about-img-accent">
          <img
            src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400&q=80"
            alt="Classic French wine selection at Brasserie 1891"
            loading="lazy" />
        </div>
        <div class="about-badge" aria-label="Established 1891">
          <span>Since</span>
          <strong>1891</strong>
        </div>
      </div>

      <!-- Text -->
      <div class="about-text">
        <p class="section-label">{{ lang.t().about.label }}</p>
        <h2 class="section-title">{{ lang.t().about.titlePre }} <em>{{ lang.t().about.titleEm }}</em></h2>

        <p>{{ lang.t().about.p1 }}</p>
        <p>{{ lang.t().about.p2 }}</p>

        <div class="about-stats" role="list" aria-label="Key facts">
          <div class="stat" role="listitem">
            <strong>130+</strong>
            <span>{{ lang.t().about.stat1 }}</span>
          </div>
          <div class="stat" role="listitem">
            <strong>85</strong>
            <span>{{ lang.t().about.stat2 }}</span>
          </div>
          <div class="stat" role="listitem">
            <strong>4</strong>
            <span>{{ lang.t().about.stat3 }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
