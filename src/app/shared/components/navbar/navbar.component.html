<nav class="navbar" [class.scrolled]="isScrolled" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">

    <a class="nav-logo" (click)="scrollTo('home')" role="link" aria-label="Go to top">
      <span class="logo-mark" aria-hidden="true">❧</span>
      <span class="logo-text">Brasserie <em>1891</em></span>
    </a>

    <div class="nav-controls">
      <button class="lang-toggle" (click)="toggleLang()" [attr.aria-label]="lang.current() === 'en' ? 'Switch to Greek' : 'Switch to English'">
        <span [class.active]="lang.current() === 'en'">EN</span>
        <span class="sep">/</span>
        <span [class.active]="lang.current() === 'el'">ΕΛ</span>
      </button>

      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme.isDark ? 'Switch to light theme' : 'Switch to dark theme'" [attr.aria-pressed]="!theme.isDark">
        <svg *ngIf="theme.isDark" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg *ngIf="!theme.isDark" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <button class="nav-toggle" [class.open]="isMenuOpen" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <ul class="nav-links" [class.open]="isMenuOpen" role="list">
      <li><a (click)="scrollTo('about')"        role="link">{{ lang.t().nav.about }}</a></li>
      <li><a (click)="scrollTo('menu')"         role="link">{{ lang.t().nav.menu }}</a></li>
      <li><a (click)="scrollTo('gallery')"      role="link">{{ lang.t().nav.gallery }}</a></li>
      <li><a (click)="scrollTo('hours')"        role="link">{{ lang.t().nav.hours }}</a></li>
      <li><a (click)="scrollTo('reservations')" role="link" class="nav-reserve">{{ lang.t().nav.reservations }}</a></li>
      <li><a (click)="scrollTo('contact')"      role="link" class="nav-cta">{{ lang.t().nav.findUs }}</a></li>
    </ul>

  </div>
</nav>
